# Server configuration
server.port=8080

# Application name
spring.application.name=API-GATEWAY

# Spring Cloud Gateway routes
spring.cloud.gateway.routes[0].id=zone-service
spring.cloud.gateway.routes[0].uri=lb://ZONE-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/zones/**

spring.cloud.gateway.routes[1].id=sensor-service
spring.cloud.gateway.routes[1].uri=lb://SENSOR-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/sensors/**

spring.cloud.gateway.routes[2].id=automation-service
spring.cloud.gateway.routes[2].uri=lb://AUTOMATION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/automation/**

spring.cloud.gateway.routes[3].id=crop-service
spring.cloud.gateway.routes[3].uri=lb://CROP-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/crops/**

# Eureka client configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true